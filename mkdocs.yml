site_name: Needlr
site_url: https://github.devleader.ca/needlr/
site_description: Opinionated fluent dependency injection for .NET with source generation
repo_url: https://github.com/ncosentino/needlr
repo_name: ncosentino/needlr
strict: true

# Custom footer content. Renders inside mkdocs-material's .md-copyright__highlight
# div, replacing the default "Made with Material for MkDocs" text (which is
# suppressed via extra.generator: false below). HTML is passed through verbatim.
#
# Each link uses descriptive keyword-rich anchor text rather than a bare URL
# or "click here" — SEO value comes from the words inside <a>...</a>, not
# the href target, so anchor text quality directly drives backlink value.
copyright: >
  &copy; Nick Cosentino
  <br>
  <a href="https://www.devleader.ca">Dev Leader: software engineering blog and C# tutorials by Nick Cosentino</a>
  <br>
  <a href="https://links.devleader.ca">Dev Leader links: videos, courses, Discord, and social channels</a>
  <br>
  <a href="https://www.brandghost.ai">BrandGhost: social media and SEO automation for brands</a>

theme:
  name: material
  # Relocated out of docs_dir because mkdocs copies everything under
  # docs_dir into site/ as static assets, which was causing the Jinja
  # override template to be served publicly at /overrides/main.html.
  # Convention in mkdocs-material's own docs is to put custom_dir at
  # repo root, outside docs_dir.
  custom_dir: overrides
  logo: assets/needlr.webp
  favicon: assets/needlr.webp
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
    - toc.integrate
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

