plugins:
  - search
  - meta

# Scoped to /api/ pages only at runtime (the JS checks window.location.pathname
# before rendering). mkdocs-material's built-in version provider would
# inject a dropdown on every page of the site, which we don't want —
# versioning is only meaningful for the API reference.
extra_javascript:
  - javascripts/api-version-switcher.js

hooks:
  - docs/hooks/schema.py
  - docs/hooks/llms_txt.py

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.magiclink
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 4

extra:
  # Suppress mkdocs-material's default "Made with Material for MkDocs" footer
  # attribution. We already provide copyright content above with backlinks
  # that carry more SEO value than the default attribution line.
  generator: false
  analytics:
    provider: google
    property: G-F9P4TGM7EZ
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ncosentino/needlr

docs_dir: docs
