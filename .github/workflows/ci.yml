name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  build-and-test:
    # PitCrew default. Set CI_RUNNER=ubuntu-latest for the manual cloud fallback.
    # Untrusted fork pull requests always use GitHub-hosted infrastructure.
    runs-on: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork && 'ubuntu-latest' || vars.CI_RUNNER || fromJSON('["self-hosted","linux","x64","general-purpose"]') }}
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Needed for NBGV / SourceLink / deterministic builds

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          10.0.x

    - name: Add .NET global tools to PATH
      run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

    - name: Restore
      run: dotnet restore src/NexusLabs.Needlr.slnx

    - name: Build (Release)
      env:
        # Nerdbank.GitVersioning's SetCloudBuildVariables MSBuild task detects
        # GITHUB_ACTIONS=true and appends version metadata to $GITHUB_ENV during
        # every project build. When parallel MSBuild workers race on the shared
        # env file, a torn line can cause the runner post-step to fail with
        # "Invalid format '<value>'". Redirecting to step-local tempfiles means
        # NBGV writes harmlessly; the runner's real env file stays untouched.
        GITHUB_ENV: /tmp/discard-build-env
        GITHUB_OUTPUT: /tmp/discard-build-output
      run: dotnet build src/NexusLabs.Needlr.slnx --configuration Release --no-restore

    - name: Test with Coverage
      run: |
        failed=0
        while IFS= read -r proj; do
          echo "::group::Testing $(basename "$proj")"
          dotnet test "$proj" \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --blame-hang \
            --blame-hang-dump-type none \
            --blame-hang-timeout 5m \
            --filter "Category!=Integration" \
            --collect:"XPlat Code Coverage" \
            --results-directory coverage || failed=1
          echo "::endgroup::"
        done < <(find src -name '*.csproj' -path '*Tests*' | sort)
        exit $failed

    - name: Install ReportGenerator
      run: dotnet tool install -g dotnet-reportgenerator-globaltool

    - name: Generate Coverage Reports
      run: |
        reportgenerator \
          -reports:"coverage/**/coverage.cobertura.xml" \
          -targetdir:"coverage/report" \
          -reporttypes:"Html;JsonSummary;MarkdownSummaryGithub;Badges"

    - name: Extract Coverage Percentage
      id: coverage
      run: |
        COVERAGE=$(jq '.summary.linecoverage' coverage/report/Summary.json)
        echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT
        echo "Coverage: $COVERAGE%"

    - name: Add Coverage to Job Summary
      run: cat coverage/report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

    - name: Upload Coverage Report Artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage/report/

    - name: Setup Python for MkDocs
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install MkDocs
      run: pip install "mkdocs>=1.5,<2.0" mkdocs-material

    - name: Restore dotnet tools
      run: dotnet tool restore

    - name: Generate API Documentation
      run: ./scripts/generate-api-docs.sh docs/api/dev --update-index

    # NOTE: there used to be an "Ensure Stable API Docs Are Available" step
    # here that wrote a placeholder to docs/api/stable/index.md when the
    # working tree lacked package subdirs (which it always did, because
    # .gitignore blocks them from being tracked on main). That step's output
    # was then built by mkdocs and deployed, clobbering the real stable docs
    # on gh-pages every time a push to main happened. See the architecture
    # docs/rfc for the full history.
    #
    # The fix: ci.yml no longer writes to or deploys /api/stable/* at all.
    # The tracked docs/api/stable/index.md on main is a minimal placeholder
    # that mkdocs can build against without erroring; the "Restrict deploy
    # to ci.yml-owned paths" step below deletes the built artifact from
    # ./site/ before peaceiris pushes, so keep_files: true preserves the
    # real stable content on gh-pages written by release.yml.

    - name: Generate Articles Page
      run: python scripts/generate-articles.py docs/articles.md

    - name: Build Documentation
      run: python -m mkdocs build

    - name: Build sitemap index
      # mkdocs's default /sitemap.xml is a single flat file containing only
      # pages mkdocs knows about at this build time — which excludes the
      # /api/stable/ slice owned by release.yml. Replace it with a sitemap
      # index referencing per-slice sub-sitemaps, including the stable slice
      # currently on gh-pages (fetched via the GitHub API). The sub-sitemaps
      # ci.yml owns (/sitemap-main.xml, /api/dev/sitemap.xml) are regenerated
      # from this build's ./site/; the release.yml-owned /api/stable slice on
      # gh-pages is preserved via peaceiris keep_files.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: python scripts/build-sitemap-index.py ./site

    - name: Add Coverage Report to Site
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        mkdir -p site/coverage
        cp -r coverage/report/* site/coverage/

    - name: Update Coverage Badge JSON
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        mkdir -p .github/badges
        cat > .github/badges/coverage.json << EOF
        {
          "schemaVersion": 1,
          "label": "coverage",
          "message": "${{ steps.coverage.outputs.percentage }}%",
          "color": "$([ $(echo "${{ steps.coverage.outputs.percentage }} >= 80" | bc -l) -eq 1 ] && echo 'brightgreen' || ([ $(echo "${{ steps.coverage.outputs.percentage }} >= 60" | bc -l) -eq 1 ] && echo 'yellow' || echo 'red'))"
        }
        EOF

    - name: Commit Coverage Badge
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      continue-on-error: true
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        TEMP_BADGE=$(mktemp)
        cp .github/badges/coverage.json "$TEMP_BADGE"
        git fetch origin main
        git reset --hard origin/main
        cp "$TEMP_BADGE" .github/badges/coverage.json
        rm -f "$TEMP_BADGE"
        git add .github/badges/coverage.json
        git diff --staged --quiet || git commit -m "chore: update coverage badge [skip ci]"
        git push

    - name: Restrict deploy to ci.yml-owned paths
      if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        # ci.yml owns: /api/dev/*, /coverage/*, home, feature pages, assets.
        # release.yml owns: /api/stable/*, /api/v<version>/*.
        #
        # Delete the release.yml-owned paths from our build output so the
        # peaceiris deploy (with keep_files: true) preserves whatever the
        # last release.yml run wrote to those paths on gh-pages. If we
        # don't do this, our placeholder/stale build of stable overwrites
        # the real released content on gh-pages every CI push.
        #
        # See also: release.yml has the symmetric "rm -rf ./site/api/dev"
        # so each workflow only writes to its own slices.
        rm -rf ./site/api/stable ./site/api/v*
        echo "Restricted ./site/ to ci.yml-owned paths."

    - name: Deploy Documentation and Coverage
      if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./site
        keep_files: true

    # gh-pages now holds the complete merged site (this run's own paths plus
    # whatever release.yml last wrote to /api/stable and /api/v*, preserved
    # by keep_files above) -- check it out fresh and mirror that whole tree
    # to Cloudflare Pages, rather than deploying our own partial ./site/.
    - name: Checkout gh-pages for Cloudflare mirror
      if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: actions/checkout@v4
      with:
        ref: gh-pages
        path: gh-pages-mirror

    # Cloudflare Pages allows at most 20,000 files per deployment. Keep only
    # the newest API version archives (and rewrite versions.json to match);
    # older archives stay in gh-pages history but are not published here.
    # Also removes the checkout's .git so it is not uploaded.
    - name: Trim mirror before Cloudflare deploy
      if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: python scripts/trim-cloudflare-mirror.py gh-pages-mirror --keep 20

    - name: Setup Node.js
      if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Deploy Documentation to Cloudflare Pages
      if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: cloudflare/wrangler-action@v4
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        command: pages deploy gh-pages-mirror --project-name=needlr --branch=main --commit-dirty=true

  package-validation:
    runs-on: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork && 'ubuntu-latest' || vars.CI_RUNNER || fromJSON('["self-hosted","linux","x64","general-purpose"]') }}
    # Runs in parallel with build-and-test (no 'needs')

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          10.0.x

    - name: Restore
      run: dotnet restore src/NexusLabs.Needlr.slnx

    - name: Validate package contents
      shell: pwsh
      run: scripts/test-packages.ps1

  aot-console-app:
    runs-on: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork && 'ubuntu-latest' || vars.CI_RUNNER || fromJSON('["self-hosted","linux","x64","general-purpose"]') }}
    # Runs in parallel with build-and-test (no 'needs')

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Install AOT dependencies
      run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev file

    - name: Publish AOT Console App
      env:
        GITHUB_ENV: /tmp/discard-aot-console-env
        GITHUB_OUTPUT: /tmp/discard-aot-console-output
        GITHUB_STEP_SUMMARY: /tmp/discard-aot-console-summary
      run: |
        dotnet publish src/Examples/SourceGen/AotSourceGenConsoleApp/AotSourceGenConsoleApp.csproj \
          -c Release \
          -r linux-x64 \
          --self-contained \
          -o artifacts/console

    - name: Verify Console App Executable
      run: |
        test -f artifacts/console/AotSourceGenConsoleApp
        file artifacts/console/AotSourceGenConsoleApp

    - name: Run Console App
      run: artifacts/console/AotSourceGenConsoleApp || echo "App executed (exit expected for demo)"

  aot-web-app:
    runs-on: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork && 'ubuntu-latest' || vars.CI_RUNNER || fromJSON('["self-hosted","linux","x64","general-purpose"]') }}
    # Runs in parallel with build-and-test (no 'needs')

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Install AOT dependencies
      run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev file

    - name: Publish AOT Web App
      env:
        GITHUB_ENV: /tmp/discard-aot-web-env
        GITHUB_OUTPUT: /tmp/discard-aot-web-output
        GITHUB_STEP_SUMMARY: /tmp/discard-aot-web-summary
      run: |
        dotnet publish src/Examples/SourceGen/AotSourceGenApp/AotSourceGenApp.csproj \
          -c Release \
          -r linux-x64 \
          --self-contained \
          -o artifacts/webapp

    - name: Verify Web App Executable
      run: |
        test -f artifacts/webapp/AotSourceGenApp
        file artifacts/webapp/AotSourceGenApp
