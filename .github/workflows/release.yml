name: Release

on:
  push:
    tags:
      - 'v*'    # e.g., v1.2.3 or v1.2.3-rc.1
  workflow_dispatch:  # allow manual trigger; select the tag ref in the UI or --ref with gh CLI

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  verify-main-ci:
    name: Verify main CI
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      actions: read
      contents: read

    steps:
    - name: Wait for successful same-commit main CI
      uses: actions/github-script@v8
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const deadline = Date.now() + (40 * 60 * 1000);
          let lastRun;
          while (Date.now() < deadline) {
            try {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'ci.yml',
                branch: 'main',
                event: 'push',
                per_page: 100
              });
              const run = data.workflow_runs
                .filter(candidate =>
                  candidate.head_sha === context.sha &&
                  candidate.head_branch === 'main')
                .sort((left, right) =>
                  new Date(right.created_at) - new Date(left.created_at))[0];

              if (run) {
                lastRun = run;
                core.info(
                  `Main CI ${run.id} for ${context.sha} is ${run.status}` +
                  `${run.conclusion ? ` (${run.conclusion})` : ''}.`);
                if (run.status === 'completed') {
                  if (run.conclusion !== 'success') {
                    core.setFailed(
                      `Main CI must succeed before release: ${run.html_url}`);
                  }
                  return;
                }
              } else {
                core.info(`Waiting for main CI on ${context.sha}.`);
              }
            } catch (error) {
              core.warning(`Could not query main CI: ${error.message}`);
            }

            await new Promise(resolve => setTimeout(resolve, 15000));
          }

          core.setFailed(
            `Timed out waiting for successful main CI on ${context.sha}.` +
            `${lastRun ? ` Last observed run: ${lastRun.html_url}` : ''}`);

  publish:
    needs: verify-main-ci
    # PitCrew default. Set CI_RUNNER=ubuntu-latest for the manual cloud fallback.
    runs-on: ${{ vars.CI_RUNNER || fromJSON('["self-hosted","linux","x64","general-purpose"]') }}
    environment: release
    permissions:
      contents: write
      id-token: write
      packages: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0      # NBGV + SourceLink need full history
        fetch-tags: true    # ensure tags are available locally

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Add .NET global tools to PATH
      run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

    - name: Install NBGV CLI
      run: |
        dotnet tool install \
          --tool-path "$RUNNER_TEMP/nbgv" \
          nbgv \
          --version 3.7.115
        echo "$RUNNER_TEMP/nbgv" >> "$GITHUB_PATH"

    - name: Validate release version
      id: version
      shell: bash
      run: |
        if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
          echo "::error::Run the release workflow from a version tag."
          exit 1
        fi

        TAG="${GITHUB_REF_NAME}"
        if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
          echo "::error::Tag '${TAG}' is not a supported semantic version tag."
          exit 1
        fi

        VERSION="${TAG#v}"
        NBGV_SEMVER="$(nbgv get-version -v SemVer2)"
        NUGET_VERSION="$(nbgv get-version -v NuGetPackageVersion)"
        if [[ "${NBGV_SEMVER}" != "${VERSION}" ]]; then
          echo "::error::Tag version '${VERSION}' does not match NBGV semantic version '${NBGV_SEMVER}'."
          exit 1
        fi

        if ! grep -Fq "## [${VERSION}]" CHANGELOG.md; then
          echo "::error::CHANGELOG.md does not contain a '${VERSION}' release section."
          exit 1
        fi

        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        echo "package-version=${NUGET_VERSION}" >> "$GITHUB_OUTPUT"

    - name: Restore
      run: dotnet restore src/NexusLabs.Needlr.slnx

    - name: Build (Release)
      run: dotnet build src/NexusLabs.Needlr.slnx --configuration Release --no-restore -p:PublicRelease=true

    - name: Test
      run: |
        failed=0
        while IFS= read -r proj; do
          echo "::group::Testing $(basename "$proj")"
          dotnet test "$proj" \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --blame-hang \
            --blame-hang-dump-type none \
            --blame-hang-timeout 5m \
            --filter "Category!=Integration" \
            --collect:"XPlat Code Coverage" \
            --results-directory coverage || failed=1
          echo "::endgroup::"
        done < <(find src -name '*.csproj' -path '*Tests*' | sort)
        exit $failed

    - name: Install ReportGenerator
      run: dotnet tool install -g dotnet-reportgenerator-globaltool

    - name: Generate Coverage Reports
      run: |
        reportgenerator \
          -reports:"coverage/**/coverage.cobertura.xml" \
          -targetdir:"coverage/report" \
          -reporttypes:"Html;JsonSummary;MarkdownSummaryGithub;Badges"

    # Pack only the subset: NexusLabs.Needlr*
    #
    # The step-level env block redirects GitHub Actions file-command env vars
    # to throwaway temp files. Nerdbank.GitVersioning's SetCloudBuildVariables
    # MSBuild task detects GITHUB_ACTIONS=true and appends version metadata to
    # $GITHUB_ENV during every project build. When a step invokes `dotnet`
    # in a loop over many csproj files (as this step does), concurrent
    # MSBuild workers race on the shared env file and can produce a torn
    # line that the runner rejects at post-step time with "Invalid format
    # '<value>'". Redirecting to step-local tempfiles means NBGV writes
    # harmlessly; the runner's real env file (at the path it cached when
    # creating the step) stays untouched and post-step processing sees
    # empty state. This pattern is applied wherever we invoke dotnet in a
    # per-project loop (see also scripts/test-packages.ps1).
    - name: Pack subset (NexusLabs.Needlr*)
      shell: bash
      env:
        GITHUB_ENV: /tmp/discard-pack-env
        GITHUB_OUTPUT: /tmp/discard-pack-output
        GITHUB_STEP_SUMMARY: /tmp/discard-pack-summary
      run: |
        mkdir -p artifacts/packages
        mapfile -t PACK_PROJECTS < <(find src -name 'NexusLabs.Needlr*.csproj' \
          ! -name '*.Tests.csproj' \
          ! -name '*.Benchmarks.csproj' \
          ! -name '*IntegrationTests.csproj' \
          | sort)
        if [ ${#PACK_PROJECTS[@]} -eq 0 ]; then
          echo "No matching projects found (pattern: NexusLabs.Needlr*)."
          exit 1
        fi

        echo "Packing projects:"
        printf ' - %s\n' "${PACK_PROJECTS[@]}"

        for csproj in "${PACK_PROJECTS[@]}"; do
          dotnet pack "$csproj" \
            --configuration Release \
            --no-build \
            -p:PublicRelease=true \
            --output artifacts/packages
        done

    - name: List packages
      run: ls -la artifacts/packages

    - name: Validate package versions
      shell: pwsh
      run: |
        $expectedVersion = '${{ steps.version.outputs.package-version }}'
        $packages = @(
          Get-ChildItem artifacts/packages -Filter '*.nupkg'
        )
        if ($packages.Count -eq 0) {
          throw 'No NuGet packages were produced.'
        }
        foreach ($package in $packages) {
          if (-not $package.BaseName.EndsWith(
            ".$expectedVersion",
            [System.StringComparison]::OrdinalIgnoreCase)) {
            throw "Package '$($package.Name)' does not use expected version '$expectedVersion'."
          }
        }

    - name: Extract Release Notes from CHANGELOG
      id: release-notes
      shell: bash
      run: |
        VERSION="${GITHUB_REF_NAME#v}"  # v0.0.2-alpha.1 → 0.0.2-alpha.1
        
        # Extract section between this version header and next version header
        NOTES=$(awk -v ver="$VERSION" '
          /^## \[/ { 
            if (found) exit
            if (index($0, "[" ver "]")) {
              found=1
              next
            }
          }
          found && /^\[[^]]+\]: / { exit }
          found { print }
        ' CHANGELOG.md)
        
        if [ -z "$NOTES" ]; then
          echo "::warning::No changelog entry found for version $VERSION"
          NOTES="Release $VERSION - see CHANGELOG.md for details."
        fi
        
        # Output for GitHub Release body (multiline)
        {
          echo "notes<<CHANGELOG_EOF"
          echo "$NOTES"
          echo "CHANGELOG_EOF"
        } >> "$GITHUB_OUTPUT"

    # Build documentation before publishing packages so Python setup and
    # documentation-build failures happen before irreversible publication.
    - name: Setup Python for MkDocs
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install MkDocs
      run: python -m pip install -r docs/requirements.txt

    - name: Restore dotnet tools
      run: dotnet tool restore

    - name: Generate Versioned API Documentation
      run: |
        VERSION="${GITHUB_REF_NAME#v}"  # v0.0.2-alpha.1 → 0.0.2-alpha.1
        ./scripts/generate-versioned-api-docs.sh "$VERSION"

    - name: Generate Dev API Documentation
      run: ./scripts/generate-api-docs.sh docs/api/dev --update-index

    - name: Generate Articles Page
      run: python scripts/generate-articles.py docs/articles.md

    - name: Build Documentation
      run: python -m mkdocs build

    - name: Build sitemap index
      # Same reason as ci.yml: replace mkdocs's flat default with a sitemap
      # index + per-slice sub-sitemaps. release.yml owns /sitemap-main.xml
      # (matching ci.yml's copy) and /api/stable/sitemap.xml.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: python scripts/build-sitemap-index.py ./site

    - name: Add Coverage Report to Site
      run: |
        mkdir -p site/coverage
        cp -r coverage/report/* site/coverage/

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Authenticate to NuGet.org
      id: nuget-login
      uses: NuGet/login@v1
      with:
        user: ncosentino

    - name: Push to NuGet.org
      env:
        NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
      run: |
        dotnet nuget push "artifacts/packages/*.nupkg" \
          --api-key "$NUGET_API_KEY" \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate

    - name: Push to GitHub Packages
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        dotnet nuget push "artifacts/packages/*.nupkg" \
          --api-key "$GITHUB_TOKEN" \
          --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
          --skip-duplicate

    - name: Restrict deploy to release.yml-owned paths
      run: |
        # release.yml owns: /api/stable/*, /api/v<this-version>/*, home,
        # feature pages, assets, /api/index.html.
        # ci.yml owns: /api/dev/*, /coverage/*.
        #
        # Delete the ci.yml-owned paths from our build output so the
        # peaceiris deploy below (with keep_files: true) preserves whatever
        # the last ci.yml run wrote to those paths on gh-pages. This ensures
        # /api/dev/ always reflects the latest main commit, not whatever
        # the release tag's commit happened to have.
        #
        # See also: ci.yml has the symmetric "rm -rf ./site/api/stable
        # ./site/api/v*" so each workflow only writes to its own slices.
        rm -rf ./site/api/dev
        echo "Restricted ./site/ to release.yml-owned paths."

    - name: Deploy Documentation
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./site
        keep_files: true

    # gh-pages now holds the complete merged site (this run's own paths plus
    # whatever ci.yml last wrote to /api/dev, preserved by keep_files above)
    # -- check it out fresh and mirror that whole tree to Cloudflare Pages,
    # rather than deploying our own partial ./site/.
    - name: Checkout gh-pages for Cloudflare mirror
      uses: actions/checkout@v4
      with:
        ref: gh-pages
        path: gh-pages-mirror

    # Cloudflare Pages allows at most 20,000 files per deployment. Keep only
    # the newest API version archives (and rewrite versions.json to match);
    # older archives stay in gh-pages history but are not published here.
    # Also removes the checkout's .git so it is not uploaded.
    - name: Trim mirror before Cloudflare deploy
      run: python scripts/trim-cloudflare-mirror.py gh-pages-mirror --keep 20

    - name: Deploy Documentation to Cloudflare Pages
      uses: cloudflare/wrangler-action@v4
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        command: pages deploy gh-pages-mirror --project-name=needlr --branch=main --commit-dirty=true

    # NOTE: the "Commit Stable API Docs to Main" step that used to live
    # after Deploy Documentation has been deleted. It tried to commit
    # generated API docs back to main, but .gitignore blocks
    # `docs/api/v*/` and `docs/api/stable/NexusLabs.Needlr*/`, so the step
    # fought the repo's own rules on every release and required three
    # separate "root-cause fix" commits (523cd5f9, 68be9747, e775d648)
    # each of which introduced a new failure mode.
    #
    # Generated docs now live exclusively on the gh-pages branch. Historical
    # per-version /api/v<N>/ directories are preserved forever because
    # nothing in either workflow ever deletes or overwrites them on
    # gh-pages — peaceiris's keep_files: true handles that guarantee as
    # long as neither workflow writes to those paths in its ./site/ output.

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body: ${{ steps.release-notes.outputs.notes }}
        draft: false
        prerelease: ${{ contains(github.ref_name, '-') }}
        files: |
          artifacts/packages/*.nupkg
          artifacts/packages/*.snupkg
