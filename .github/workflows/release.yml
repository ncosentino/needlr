name: Release

on:
  push:
    tags:
      - 'v*'    # e.g., v1.2.3 or v1.2.3-rc.1
  workflow_dispatch:  # allow manual trigger; select the tag ref in the UI or --ref with gh CLI

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0      # NBGV + SourceLink need full history
        fetch-tags: true    # ensure tags are available locally

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install NBGV CLI
      run: dotnet tool install -g nbgv

    - name: Validate tag format & prepare version
      id: version
      shell: bash
      run: |
        export NBGV_PublicRelease=true    # force public release behavior

        TAG="${GITHUB_REF_NAME}"          # e.g., v0.0.1-alpha.3
        TAG_CLEAN="${TAG#v}"              # strip leading "v"

        echo "Git tag: ${TAG}"
        echo "Clean tag: ${TAG_CLEAN}"

        # We don't hard-fail here if NBGV outputs a height suffix; we trust the tag for publishing
        NUGETVER="$(nbgv get-version -v NuGetPackageVersion || true)"
        echo "NBGV NuGetPackageVersion: ${NUGETVER}"

        echo "version=${TAG_CLEAN}" >> "$GITHUB_OUTPUT"

    - name: Restore
      run: dotnet restore src/NexusLabs.Needlr.slnx

    - name: Build (Release)
      run: dotnet build src/NexusLabs.Needlr.slnx --configuration Release --no-restore -p:PublicRelease=true

    - name: Test
      run: |
        dotnet test src/NexusLabs.Needlr.slnx \
          --configuration Release \
          --no-build \
          --verbosity normal \
          --collect:"XPlat Code Coverage" \
          --results-directory coverage

    - name: Install ReportGenerator
      run: dotnet tool install -g dotnet-reportgenerator-globaltool

    - name: Generate Coverage Reports
      run: |
        reportgenerator \
          -reports:"coverage/**/coverage.cobertura.xml" \
          -targetdir:"coverage/report" \
          -reporttypes:"Html;JsonSummary;MarkdownSummaryGithub;Badges"

    # Pack only the subset: NexusLabs.Needlr*
    #
    # The step-level env block redirects GitHub Actions file-command env vars
    # to throwaway temp files. Nerdbank.GitVersioning's SetCloudBuildVariables
    # MSBuild task detects GITHUB_ACTIONS=true and appends version metadata to
    # $GITHUB_ENV during every project build. When a step invokes `dotnet`
    # in a loop over many csproj files (as this step does), concurrent
    # MSBuild workers race on the shared env file and can produce a torn
    # line that the runner rejects at post-step time with "Invalid format
    # '<value>'". Redirecting to step-local tempfiles means NBGV writes
    # harmlessly; the runner's real env file (at the path it cached when
    # creating the step) stays untouched and post-step processing sees
    # empty state. This pattern is applied wherever we invoke dotnet in a
    # per-project loop (see also scripts/test-packages.ps1).
    - name: Pack subset (NexusLabs.Needlr*)
      shell: bash
      env:
        GITHUB_ENV: /tmp/discard-pack-env
        GITHUB_OUTPUT: /tmp/discard-pack-output
        GITHUB_STEP_SUMMARY: /tmp/discard-pack-summary
      run: |
        mkdir -p artifacts/packages
        mapfile -t PACK_PROJECTS < <(find src -name 'NexusLabs.Needlr*.csproj' \
          ! -name '*.Tests.csproj' \
          ! -name '*.Benchmarks.csproj' \
          ! -name '*IntegrationTests.csproj' \
          | sort)
        if [ ${#PACK_PROJECTS[@]} -eq 0 ]; then
          echo "No matching projects found (pattern: NexusLabs.Needlr*)."
          exit 1
        fi

        echo "Packing projects:"
        printf ' - %s\n' "${PACK_PROJECTS[@]}"

        for csproj in "${PACK_PROJECTS[@]}"; do
          dotnet pack "$csproj" \
            --configuration Release \
            --no-build \
            -p:PublicRelease=true \
            --output artifacts/packages
        done

    - name: List packages
      run: ls -la artifacts/packages

    - name: Push to NuGet.org
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      run: |
        dotnet nuget push "artifacts/packages/*.nupkg" \
          --api-key "$NUGET_API_KEY" \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate

    - name: Push to GitHub Packages
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        dotnet nuget push "artifacts/packages/*.nupkg" \
          --api-key "$GITHUB_TOKEN" \
          --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
          --skip-duplicate

    - name: Extract Release Notes from CHANGELOG
      id: release-notes
      shell: bash
      run: |
        VERSION="${GITHUB_REF_NAME#v}"  # v0.0.2-alpha.1 → 0.0.2-alpha.1
        
        # Extract section between this version header and next version header
        NOTES=$(awk -v ver="$VERSION" '
          /^## \[/ { 
            if (found) exit
            if (index($0, "[" ver "]")) found=1
          }
          found { print }
        ' CHANGELOG.md)
        
        if [ -z "$NOTES" ]; then
          echo "::warning::No changelog entry found for version $VERSION"
          NOTES="Release $VERSION - see CHANGELOG.md for details."
        fi
        
        # Output for GitHub Release body (multiline)
        {
          echo "notes<<CHANGELOG_EOF"
          echo "$NOTES"
          echo "CHANGELOG_EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Setup Python for MkDocs
      run: |
        python3 -m pip install --upgrade pip
        pip install "mkdocs>=1.5,<2.0" mkdocs-material mike

    - name: Restore dotnet tools
      run: dotnet tool restore

    - name: Generate Versioned API Documentation
      run: |
        VERSION="${GITHUB_REF_NAME#v}"  # v0.0.2-alpha.1 → 0.0.2-alpha.1
        ./scripts/generate-versioned-api-docs.sh "$VERSION"

    - name: Generate Dev API Documentation
      run: ./scripts/generate-api-docs.sh docs/api/dev --update-index

    - name: Generate Articles Page
      run: python scripts/generate-articles.py docs/articles.md

    - name: Build Documentation
      run: python -m mkdocs build

    - name: Add Coverage Report to Site
      run: |
        mkdir -p site/coverage
        cp -r coverage/report/* site/coverage/

    - name: Restrict deploy to release.yml-owned paths
      run: |
        # release.yml owns: /api/stable/*, /api/v<this-version>/*, home,
        # feature pages, assets, /api/index.html.
        # ci.yml owns: /api/dev/*, /coverage/*.
        #
        # Delete the ci.yml-owned paths from our build output so the
        # peaceiris deploy below (with keep_files: true) preserves whatever
        # the last ci.yml run wrote to those paths on gh-pages. This ensures
        # /api/dev/ always reflects the latest main commit, not whatever
        # the release tag's commit happened to have.
        #
        # See also: ci.yml has the symmetric "rm -rf ./site/api/stable
        # ./site/api/v*" so each workflow only writes to its own slices.
        rm -rf ./site/api/dev
        echo "Restricted ./site/ to release.yml-owned paths."

    - name: Deploy Documentation
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./site
        keep_files: true

    # NOTE: the "Commit Stable API Docs to Main" step that used to live
    # after Deploy Documentation has been deleted. It tried to commit
    # generated API docs back to main, but .gitignore blocks
    # `docs/api/v*/` and `docs/api/stable/NexusLabs.Needlr*/`, so the step
    # fought the repo's own rules on every release and required three
    # separate "root-cause fix" commits (523cd5f9, 68be9747, e775d648)
    # each of which introduced a new failure mode.
    #
    # Generated docs now live exclusively on the gh-pages branch. Historical
    # per-version /api/v<N>/ directories are preserved forever because
    # nothing in either workflow ever deletes or overwrites them on
    # gh-pages — peaceiris's keep_files: true handles that guarantee as
    # long as neither workflow writes to those paths in its ./site/ output.

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body: ${{ steps.release-notes.outputs.notes }}
        draft: false
        prerelease: ${{ contains(github.ref_name, '-') }}
        files: |
          artifacts/packages/*.nupkg
          artifacts/packages/*.snupkg
